query RecipientDetailsGov($lang: String!, $year: String!, $row_id: String!) {
  root(lang: $lang) {
    gov {
      recipient_details(year: $year, row_id: $row_id) {
        id
        row_id
        year
        recipient
        org_id
        transfer_payment
        city
        province
        country
        expenditure
      }
    }
  }
}
